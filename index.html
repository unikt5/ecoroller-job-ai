<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ECOROLLER AI Job Hunter</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="workspace">
      <aside class="panel cv-panel">
        <div class="brand">
          <span class="brand-mark">E</span>
          <div>
            <h1>ECOROLLER AI Job Hunter</h1>
            <p>CV matching for jobs in Austria</p>
          </div>
        </div>

        <label class="upload-box" for="cvFile">
          <span class="upload-icon">CV</span>
          <strong>Upload your CV</strong>
          <small>PDF, DOCX, or TXT</small>
          <input id="cvFile" type="file" accept=".pdf,.docx,.txt,.text,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,text/plain">
        </label>

        <div class="field-grid">
          <label>
            Target location
            <input id="locationInput" value="Austria" placeholder="Austria, Vienna, Graz...">
          </label>
          <label>
            Search radius
            <select id="radiusInput">
              <option value="20">20 km</option>
              <option value="50" selected>50 km</option>
              <option value="100">100 km</option>
              <option value="0">All Austria</option>
            </select>
          </label>
        </div>

        <label>
          Extra job keywords
          <input id="manualKeywords" placeholder="airport, warehouse, driver, IT...">
        </label>

        <div class="actions">
          <button id="scanBtn" class="primary-btn" type="button" disabled>Scan Jobs</button>
          <button id="demoBtn" class="secondary-btn" type="button">Try Demo CV</button>
        </div>

        <div id="profileSummary" class="profile-summary">
          <span class="empty-state">Upload a CV to extract skills and job targets.</span>
        </div>
      </aside>

      <section class="results-panel">
        <div class="toolbar">
          <div>
            <p id="status" class="status">Ready</p>
            <h2>Matched job leads</h2>
          </div>
          <div class="filters">
            <label class="toggle">
              <input id="readyOnly" type="checkbox" checked>
              <span>Ready to apply</span>
            </label>
            <select id="sortInput">
              <option value="match">Best match</option>
              <option value="recent">Newest</option>
            </select>
          </div>
        </div>

        <div id="results" class="results empty-results">
          <div>
            <strong>No scan yet</strong>
            <p>Upload your CV, then start a search. The app extracts CV text locally in your browser.</p>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>
  <script src="app.js?v=2"></script>
</body>
</html>
